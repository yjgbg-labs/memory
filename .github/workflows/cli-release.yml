name: CLI Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: tespkg/actions-cache@v1
        with:
          endpoint: s3.yjgbg.lab
          insecure: true
          accessKey: ${{ secrets.S3_ACCESS_KEY }}
          secretKey: ${{ secrets.S3_SECRET_KEY }}
          bucket: actions-cache
          use-fallback: false
          path: |
            ~/.rustup
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: cli-${{ hashFiles('cli/Cargo.lock') }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release

      - name: Prepare release artifacts
        run: |
          cp target/release/memory-cli memory-cli-linux-x86_64
          gzip -k memory-cli-linux-x86_64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/memory-cli-linux-x86_64
            cli/memory-cli-linux-x86_64.gz
